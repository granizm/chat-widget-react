apiVersion: v1
kind: Namespace
metadata:
  name: chat-widget
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-widget-sample
  namespace: chat-widget
  labels:
    app: chat-widget-sample
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-widget-sample
  template:
    metadata:
      labels:
        app: chat-widget-sample
    spec:
      containers:
        - name: chat-widget-sample
          image: ghcr.io/granizm/chat-widget-sample:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      imagePullSecrets:
        - name: ghcr-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: chat-widget
  namespace: chat-widget
  annotations:
    tailscale.com/hostname: "chat-widget"
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    app: chat-widget-sample
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
